<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download - Kamio Games</title>
    <link rel="stylesheet" href="styles.css?v=3" />
    <link rel="icon" type="image/png" href="Asset/Kamio-games-logo.png" />
  </head>
  <body class="download-page">
    <div id="header-placeholder"></div>

    <main>
      <section class="download-hero">
        <div class="download-hero-content">
          <p class="eyebrow">Download Game</p>
          <h1>Memories We Never Had</h1>
          <p>
            Choose your platform and download the latest available build from
            Kamio Games.
          </p>

          <div class="download-actions download-actions-center">
            <a
              class="download-button android-download"
              href="javascript:void(0)"
              onclick="showComingSoon('Google Play Store')"
            >
              <span class="download-icon">
                <img src="Asset/playstore.png" alt="Google Play" />
              </span>
              <span>
                <strong>Google Play</strong>
                <small>Coming Soon</small>
              </span>
            </a>

            <a
              class="download-button windows-download"
              href="javascript:void(0)"
              onclick="showComingSoon('Steam')"
            >
              <span class="download-icon">
                <img src="Asset/steam.png" alt="Windows" />
              </span>
              <span>
                <strong>Steam</strong>
                <small>Coming Soon</small>
              </span>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer portal-footer section-label" data-point="7">
      <div class="footer-top-nexon">
        <div class="footer-brand-nexon">
          <img
            class="footer-logo"
            src="Asset/Kamio-games-logo.png"
            alt="Kamio Games"
          />
          <span>KAMIO GAMES</span>
        </div>
        <nav class="footer-links-nexon" aria-label="Footer navigation">
          <a href="about.html">About Studio</a>
          <a href="devlog.html">Newsroom</a>
          <a href="contact.html">Contact / Support</a>
          <a href="press-kit.html">Press Kit</a>
          <a href="privacy.html">Privacy Policy</a>
        </nav>
      </div>
      <div class="footer-bottom-nexon">
        <p>&copy; 2026 Kamio Games Corporation. All rights reserved.</p>
      </div>
    </footer>
    <script src="lightbox.js"></script>
    <script src="popup.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
